name: Agent Fleet Trigger

# ─────────────────────────────────────────────────────────────────────────────
# SETUP
# 1. Copy this file to .github/workflows/fleet-trigger.yml in your project
# 2. Add a .fleet.yml config to your project root (see templates/.fleet.yml)
# 3. Set these GitHub Secrets (repo or org level):
#      VPS_SSH_KEY  — private key from setup-vps-for-github.sh
#      VPS_HOST     — VPS IP or hostname
#      VPS_USER     — SSH user (fleet-runner)
#      FLEET_DIR    — path to agent-fleet on VPS (e.g. /home/ubuntu/agent-fleet)
#
# LABEL REFERENCE (add to your repo via setup-github-labels.sh)
#   claude:run        → auto-route to best agent based on keywords
#   claude:junior     → assign to Junior Dev agent
#   claude:senior     → assign to Senior Dev agent
#   claude:expert     → assign to Expert Architect agent
#   claude:pipeline   → run Junior → Senior → Expert in sequence
#   claude:review     → code review by Senior (good for PRs)
#   claude:priority   → bump to front of queue (priority 2)
# ─────────────────────────────────────────────────────────────────────────────

on:
  # Trigger when a label is added to an issue
  issues:
    types: [labeled]

  # Trigger on PR open/update — auto code review by Senior agent
  pull_request:
    types: [opened, synchronize, reopened]

  # Manual trigger from GitHub Actions UI (Actions tab → Run workflow)
  workflow_dispatch:
    inputs:
      title:
        description: "Task title"
        required: true
      body:
        description: "Full task description"
        required: true
      agent:
        description: "Agent to assign"
        required: false
        default: "auto"
        type: choice
        options: [auto, junior, senior, expert]
      pipeline:
        description: "Pipeline agents (comma-separated) or leave blank"
        required: false
        default: ""

  # Nightly maintenance task at 2 AM UTC
  schedule:
    - cron: "0 2 * * *"

jobs:
  # ── Job 1 ───────────────────────────────────────────────────────────────────
  # Reads the trigger (issue/PR/manual/schedule) and normalises it into
  # a consistent task spec that all downstream jobs consume via outputs.
  # ────────────────────────────────────────────────────────────────────────────
  resolve:
    name: Resolve trigger
    runs-on: ubuntu-latest
    outputs:
      should_run:   ${{ steps.resolve.outputs.should_run }}
      task_title:   ${{ steps.resolve.outputs.task_title }}
      task_body:    ${{ steps.resolve.outputs.task_body }}
      agent:        ${{ steps.resolve.outputs.agent }}
      pipeline:     ${{ steps.resolve.outputs.pipeline }}
      priority:     ${{ steps.resolve.outputs.priority }}
      issue_number: ${{ steps.resolve.outputs.issue_number }}
      pr_number:    ${{ steps.resolve.outputs.pr_number }}
      source:       ${{ steps.resolve.outputs.source }}
      repo_name:    ${{ steps.resolve.outputs.repo_name }}

    steps:
      - name: Resolve task spec
        id: resolve
        uses: actions/github-script@v7
        with:
          script: |
            const event      = context.eventName;
            const repoName   = context.repo.repo;
            const repoOwner  = context.repo.owner;
            let should_run   = false;
            let task_title   = '';
            let task_body    = '';
            let agent        = 'auto';
            let pipeline     = '';
            let priority     = '5';
            let issue_number = '';
            let pr_number    = '';
            let source       = event;

            // ── Issue labeled ─────────────────────────────────────────────
            // Only fires when a claude: label is added. Ignores all other labels.
            if (event === 'issues' && context.payload.action === 'labeled') {
              const issue  = context.payload.issue;
              const labels = issue.labels.map(l => l.name.toLowerCase());

              // Skip if no claude: label present
              if (!labels.some(l => l.startsWith('claude:'))) {
                core.setOutput('should_run', 'false'); return;
              }

              // Agent routing — explicit label takes priority over auto
              if      (labels.includes('claude:expert'))  agent = 'expert';
              else if (labels.includes('claude:senior'))  agent = 'senior';
              else if (labels.includes('claude:junior'))  agent = 'junior';
              else if (labels.includes('claude:review'))  agent = 'senior';
              else                                         agent = 'auto';

              if (labels.includes('claude:pipeline'))     pipeline = 'junior,senior,expert';
              if (labels.includes('claude:priority'))     priority = '2';

              task_title   = issue.title;
              task_body    = [
                issue.body || '(no description)',
                '',
                'Source: GitHub Issue #' + issue.number,
                'Repo: ' + repoOwner + '/' + repoName,
                'URL: ' + issue.html_url,
                'Labels: ' + labels.join(', '),
                'Author: ' + issue.user.login,
              ].join('\n');

              issue_number = String(issue.number);
              should_run   = true;
              source       = 'github_issue';
            }

            // ── Pull request ──────────────────────────────────────────────
            // Auto-assigns Senior agent for code review. Skips draft PRs.
            else if (event === 'pull_request') {
              const pr = context.payload.pull_request;
              if (pr.draft) { core.setOutput('should_run', 'false'); return; }

              task_title = 'Code review: ' + pr.title;
              task_body  = [
                'Review this pull request for bugs, security issues, and best practices.',
                'Focus on: correctness, edge cases, error handling, and code style.',
                '',
                'PR: ' + pr.title,
                'Branch: ' + pr.head.ref + ' to ' + pr.base.ref,
                'Author: ' + pr.user.login,
                'Files changed: ' + pr.changed_files,
                '+' + pr.additions + ' / -' + pr.deletions,
                '',
                'Description:',
                pr.body || '(none)',
                '',
                'URL: ' + pr.html_url,
                'Repo: ' + repoOwner + '/' + repoName,
              ].join('\n');

              agent      = 'senior';
              pr_number  = String(pr.number);
              should_run = true;
              source     = 'github_pr';
            }

            // ── Manual dispatch ───────────────────────────────────────────
            // Triggered from Actions tab → Run workflow. Uses form inputs directly.
            else if (event === 'workflow_dispatch') {
              const inp  = context.payload.inputs;
              task_title = inp.title;
              task_body  = inp.body + '\nRepo: ' + repoOwner + '/' + repoName;
              agent      = inp.agent || 'auto';
              pipeline   = inp.pipeline || '';
              should_run = true;
              source     = 'manual';
            }

            // ── Scheduled nightly ─────────────────────────────────────────
            // Runs at 2 AM UTC. Customise the task body in .fleet.yml nightly_task.
            else if (event === 'schedule') {
              task_title = 'Nightly maintenance: ' + repoName;
              task_body  = [
                'Run the following maintenance tasks for this project:',
                '1. Dependency audit (check for vulnerabilities)',
                '2. Verify tests pass',
                '3. Check for obvious code quality issues',
                '4. Summarise findings - flag anything urgent',
                '',
                'Repo: ' + repoOwner + '/' + repoName,
                'Run: ' + new Date().toISOString(),
              ].join('\n');
              agent      = 'senior';
              priority   = '8';  // low priority — don't block real tasks
              should_run = true;
              source     = 'schedule';
            }

            core.setOutput('should_run',   String(should_run));
            core.setOutput('task_title',   task_title);
            core.setOutput('task_body',    task_body);
            core.setOutput('agent',        agent);
            core.setOutput('pipeline',     pipeline);
            core.setOutput('priority',     priority);
            core.setOutput('issue_number', issue_number);
            core.setOutput('pr_number',    pr_number);
            core.setOutput('source',       source);
            core.setOutput('repo_name',    repoName);

  # ── Job 2 ───────────────────────────────────────────────────────────────────
  # Posts an immediate "Task Received" comment on the issue/PR so the author
  # knows the workflow fired. Runs in parallel with dispatch — no waiting.
  # Skipped for manual dispatch and schedule (no issue/PR to comment on).
  # ────────────────────────────────────────────────────────────────────────────
  acknowledge:
    name: Acknowledge
    needs: resolve
    if: |
      needs.resolve.outputs.should_run == 'true' &&
      (needs.resolve.outputs.issue_number != '' || needs.resolve.outputs.pr_number != '')
    runs-on: ubuntu-latest
    steps:
      - name: Post acknowledgement comment
        uses: actions/github-script@v7
        with:
          script: |
            const agent    = '${{ needs.resolve.outputs.agent }}';
            const pipeline = '${{ needs.resolve.outputs.pipeline }}';
            const source   = '${{ needs.resolve.outputs.source }}';
            const number   = '${{ needs.resolve.outputs.issue_number }}'
                          || '${{ needs.resolve.outputs.pr_number }}';

            const agentLine = pipeline
              ? 'Pipeline: ' + pipeline.split(',').join(' -> ')
              : 'Agent: ' + (agent === 'auto' ? 'auto-routing' : agent);

            await github.rest.issues.createComment({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: parseInt(number),
              body: [
                '🤖 **Agent Fleet - Task Received**',
                '',
                agentLine,
                '**Source:** ' + source,
                '**Workflow:** [View run](' + context.serverUrl + '/' + context.repo.owner + '/' + context.repo.repo + '/actions/runs/' + context.runId + ')',
                '',
                '_Dispatching to VPS now. Results will be posted here when complete._',
              ].join('\n'),
            });

  # ── Job 3 ───────────────────────────────────────────────────────────────────
  # SSHes into the VPS and queues the task via fleet CLI.
  # Reads .fleet.yml from the project repo to get workdir, branch strategy, etc.
  # Auto-clones the project on the VPS if not already present.
  # Outputs the task_id for the report job to poll against.
  #
  # NOTE: All task variables are passed as SSH env vars (not inline in the
  # command string) to avoid YAML special character conflicts.
  # ────────────────────────────────────────────────────────────────────────────
  dispatch:
    name: Dispatch to VPS
    needs: [resolve, acknowledge]
    if: |
      always() &&
      needs.resolve.outputs.should_run == 'true' &&
      (needs.acknowledge.result == 'success' || needs.acknowledge.result == 'skipped')
    runs-on: ubuntu-latest
    outputs:
      task_id: ${{ steps.dispatch.outputs.task_id }}

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Read .fleet.yml config
        id: config
        # Parses the three most important fields from .fleet.yml.
        # Falls back to safe defaults if the file is missing.
        run: |
          if [ -f ".fleet.yml" ]; then
            WORKDIR=$(grep -E '^workdir:' .fleet.yml | awk '{print $2}' | tr -d '"' || echo "")
            BRANCH_STRATEGY=$(grep -E '^branch_strategy:' .fleet.yml | awk '{print $2}' | tr -d '"' || echo "new-branch")
            TEST_CMD=$(grep -E '^test_command:' .fleet.yml | cut -d':' -f2- | xargs || echo "npm test")
          else
            WORKDIR=""
            BRANCH_STRATEGY="new-branch"
            TEST_CMD="npm test"
          fi
          # Default workdir if not set: ~/projects/<repo-name>
          if [ -z "$WORKDIR" ]; then
            WORKDIR="~/projects/${{ needs.resolve.outputs.repo_name }}"
          fi
          echo "workdir=${WORKDIR}"                 >> $GITHUB_OUTPUT
          echo "branch_strategy=${BRANCH_STRATEGY}" >> $GITHUB_OUTPUT
          echo "test_cmd=${TEST_CMD}"               >> $GITHUB_OUTPUT

      - name: Install SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/fleet_key
          chmod 600 ~/.ssh/fleet_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Write task body to temp file
        # Using printf + env var avoids any escaping issues with special
        # characters in the task body (quotes, backslashes, etc.)
        env:
          TASK_BODY: ${{ needs.resolve.outputs.task_body }}
        run: printf '%s' "$TASK_BODY" > /tmp/task_body_${{ github.run_id }}.txt

      - name: Copy task body to VPS
        # SCP the body file separately so it doesn't need to be embedded
        # in the SSH command string (avoids escaping and size limits)
        run: |
          scp -i ~/.ssh/fleet_key \
            -o StrictHostKeyChecking=no \
            /tmp/task_body_${{ github.run_id }}.txt \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/fleet_task_${{ github.run_id }}.txt"

      - name: Dispatch via SSH
        id: dispatch
        # All task variables are passed as SSH environment variables via SendEnv.
        # This avoids embedding dynamic values in the heredoc which would cause
        # YAML parse errors (especially values containing dashes or special chars).
        env:
          FLEET_DIR:       ${{ secrets.FLEET_DIR }}
          TASK_TITLE:      ${{ needs.resolve.outputs.task_title }}
          TASK_AGENT:      ${{ needs.resolve.outputs.agent }}
          TASK_PIPELINE:   ${{ needs.resolve.outputs.pipeline }}
          TASK_PRIORITY:   ${{ needs.resolve.outputs.priority }}
          TASK_SOURCE:     ${{ needs.resolve.outputs.source }}
          TASK_RUN_ID:     ${{ github.run_id }}
          TASK_REPO:       ${{ github.repository }}
          TASK_WORKDIR:    ${{ steps.config.outputs.workdir }}
          TASK_BRANCH:     ${{ steps.config.outputs.branch_strategy }}
          TASK_TEST_CMD:   ${{ steps.config.outputs.test_cmd }}
        run: |
          TASK_ID=$(ssh -i ~/.ssh/fleet_key \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=30 \
            -o SendEnv="FLEET_DIR TASK_TITLE TASK_AGENT TASK_PIPELINE TASK_PRIORITY TASK_SOURCE TASK_RUN_ID TASK_REPO TASK_WORKDIR TASK_BRANCH TASK_TEST_CMD" \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            'bash -s' << 'ENDSSH'
          set -e
          FLEET="${FLEET_DIR:-$HOME/agent-fleet}"
          cd "$FLEET"

          # Resolve ~ in workdir path
          PROJ_DIR=$(eval echo "$TASK_WORKDIR")

          # Auto-clone project if not present, otherwise pull latest
          if [ ! -d "$PROJ_DIR" ]; then
            mkdir -p "$(dirname "$PROJ_DIR")"
            git clone "https://github.com/${TASK_REPO}.git" "$PROJ_DIR"
          else
            git -C "$PROJ_DIR" pull --ff-only 2>/dev/null || true
          fi

          # Read task body from the file SCP'd over in previous step
          BODY=$(cat "/tmp/fleet_task_${TASK_RUN_ID}.txt")
          rm -f "/tmp/fleet_task_${TASK_RUN_ID}.txt"

          # Append project context so the agent knows where it's working
          CONTEXT="Working directory: ${PROJ_DIR}
          Branch strategy: ${TASK_BRANCH}
          Test command: ${TASK_TEST_CMD}
          Repository: ${TASK_REPO}"

          FULL_BODY="${BODY}
          ${CONTEXT}"

          # Queue as pipeline or single task — prints task ID to stdout
          if [ -n "$TASK_PIPELINE" ]; then
            node cli.js pipeline-raw \
              "$TASK_TITLE" "$FULL_BODY" "$TASK_PIPELINE" \
              "$TASK_RUN_ID" "$TASK_SOURCE" "$PROJ_DIR"
          else
            node cli.js add-raw \
              "$TASK_TITLE" "$FULL_BODY" "$TASK_PRIORITY" \
              "$TASK_AGENT" "$TASK_SOURCE" "$TASK_RUN_ID" "$PROJ_DIR"
          fi
          ENDSSH
          )

          echo "task_id=${TASK_ID}" >> $GITHUB_OUTPUT
          echo "Dispatched: ${TASK_ID}"

      - name: Comment task ID
        # Posts a second comment with the internal task ID so it's
        # visible on the issue for debugging if needed
        if: |
          steps.dispatch.outputs.task_id != '' &&
          (needs.resolve.outputs.issue_number != '' || needs.resolve.outputs.pr_number != '')
        uses: actions/github-script@v7
        with:
          script: |
            const number = '${{ needs.resolve.outputs.issue_number }}'
                        || '${{ needs.resolve.outputs.pr_number }}';
            await github.rest.issues.createComment({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: parseInt(number),
              body: '📋 **Task queued** `${{ steps.dispatch.outputs.task_id }}`\n\n_Agent is working. Results posted here when done._',
            });

  # ── Job 4 ───────────────────────────────────────────────────────────────────
  # Polls the VPS every 30 seconds (up to 30 minutes) until the task reaches
  # a terminal state (complete/failed/cancelled), then posts the agent output
  # as an issue comment and closes the issue on success.
  # Times out after 35 minutes — task keeps running on VPS, result visible
  # in the dashboard instead.
  # ────────────────────────────────────────────────────────────────────────────
  report:
    name: Report result
    needs: [resolve, dispatch]
    if: |
      always() &&
      needs.dispatch.outputs.task_id != '' &&
      (needs.resolve.outputs.issue_number != '' || needs.resolve.outputs.pr_number != '')
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Install SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/fleet_key
          chmod 600 ~/.ssh/fleet_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Poll VPS for completion
        id: poll
        env:
          FLEET_DIR: ${{ secrets.FLEET_DIR }}
        run: |
          TASK_ID="${{ needs.dispatch.outputs.task_id }}"
          MAX=60      # 60 attempts x 30s = 30 minutes max
          ATTEMPT=0

          while [ $ATTEMPT -lt $MAX ]; do
            RESULT=$(ssh -i ~/.ssh/fleet_key \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=15 \
              "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
              "cd ${FLEET_DIR:-\$HOME/agent-fleet} && node cli.js task-json ${TASK_ID}" \
              2>/dev/null || echo '{}')

            STATUS=$(echo "$RESULT" | python3 -c \
              "import sys,json; print(json.load(sys.stdin).get('status',''))" \
              2>/dev/null || echo "")

            echo "[${ATTEMPT}] status: ${STATUS}"

            if [[ "$STATUS" == "complete" || "$STATUS" == "failed" || "$STATUS" == "cancelled" ]]; then
              # Escape special chars for GitHub output — newlines and percent signs
              RESULT_SAFE="${RESULT//'%'/'%25'}"
              RESULT_SAFE="${RESULT_SAFE//$'\n'/'%0A'}"
              RESULT_SAFE="${RESULT_SAFE//$'\r'/'%0D'}"
              echo "result=${RESULT_SAFE}" >> $GITHUB_OUTPUT
              echo "status=${STATUS}"      >> $GITHUB_OUTPUT
              break
            fi

            ATTEMPT=$((ATTEMPT+1))
            sleep 30
          done

          # If we ran out of attempts, mark as timeout (task still running on VPS)
          if [ $ATTEMPT -ge $MAX ]; then
            echo "status=timeout" >> $GITHUB_OUTPUT
          fi

      - name: Post result comment
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ steps.poll.outputs.status }}';
            const number = '${{ needs.resolve.outputs.issue_number }}'
                        || '${{ needs.resolve.outputs.pr_number }}';
            const taskId = '${{ needs.dispatch.outputs.task_id }}';

            // Decode the escaped result JSON back to a usable object
            let result = {};
            try {
              const raw = decodeURIComponent(
                '${{ steps.poll.outputs.result }}'
                  .replace(/%0A/g, '\n')
                  .replace(/%0D/g, '\r')
                  .replace(/%25/g, '%')
              );
              result = JSON.parse(raw || '{}');
            } catch {}

            const output  = (result.output || '').slice(0, 3500);  // truncate long output
            const error   = (result.error  || '').slice(0, 800);
            const agentId = result.agent_id || 'unknown';
            const emoji   = { complete:'✅', failed:'❌', cancelled:'🚫', timeout:'⏱️' }[status] || '❓';

            const parts = [
              emoji + ' **Agent Fleet - ' + status.charAt(0).toUpperCase() + status.slice(1) + '**',
              '',
              '**Task:** `' + taskId + '`  **Agent:** ' + agentId,
              '',
            ];

            // Wrap output in a collapsible details block to keep comments clean
            if (output) {
              parts.push('<details><summary>View output</summary>', '', '```');
              parts.push(output);
              if ((result.output || '').length > 3500) parts.push('... (truncated)');
              parts.push('```', '', '</details>');
            }

            if (error) {
              parts.push('', '**Error:**', '```', error, '```');
            }

            if (status === 'timeout') {
              parts.push('', '_Task still running. Check dashboard for live status._');
            }

            await github.rest.issues.createComment({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: parseInt(number),
              body:         parts.join('\n'),
            });

            // Auto-close the issue when task completes successfully
            if (status === 'complete' && '${{ needs.resolve.outputs.issue_number }}') {
              await github.rest.issues.update({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: parseInt(number),
                state:        'closed',
                state_reason: 'completed',
              });
            }