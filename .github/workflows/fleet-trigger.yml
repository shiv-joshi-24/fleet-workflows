name: Agent Fleet Trigger

# ─────────────────────────────────────────────────────────────────────────────
# Drop this file into any project at .github/workflows/fleet-trigger.yml
# Then add a .fleet.yml config to your project root.
# Required GitHub Secrets (set once at org level or per repo):
#   VPS_SSH_KEY, VPS_HOST, VPS_USER, FLEET_DIR
# ─────────────────────────────────────────────────────────────────────────────

on:
  issues:
    types: [labeled]

  pull_request:
    types: [opened, synchronize, reopened]

  workflow_dispatch:
    inputs:
      title:
        description: "Task title"
        required: true
      body:
        description: "Full task description"
        required: true
      agent:
        description: "Agent to assign"
        required: false
        default: "auto"
        type: choice
        options: [auto, junior, senior, expert]
      pipeline:
        description: "Pipeline agents (comma-separated) or leave blank"
        required: false
        default: ""

  schedule:
    - cron: "0 2 * * *"

jobs:
  # ── Job 1: Resolve trigger into a normalised task spec ──────────────────────
  resolve:
    name: Resolve trigger
    runs-on: ubuntu-latest
    outputs:
      should_run:   ${{ steps.resolve.outputs.should_run }}
      task_title:   ${{ steps.resolve.outputs.task_title }}
      task_body:    ${{ steps.resolve.outputs.task_body }}
      agent:        ${{ steps.resolve.outputs.agent }}
      pipeline:     ${{ steps.resolve.outputs.pipeline }}
      priority:     ${{ steps.resolve.outputs.priority }}
      issue_number: ${{ steps.resolve.outputs.issue_number }}
      pr_number:    ${{ steps.resolve.outputs.pr_number }}
      source:       ${{ steps.resolve.outputs.source }}
      repo_name:    ${{ steps.resolve.outputs.repo_name }}

    steps:
      - name: Resolve task spec
        id: resolve
        uses: actions/github-script@v7
        with:
          script: |
            const event      = context.eventName;
            const repoName   = context.repo.repo;
            const repoOwner  = context.repo.owner;
            let should_run   = false;
            let task_title   = '';
            let task_body    = '';
            let agent        = 'auto';
            let pipeline     = '';
            let priority     = '5';
            let issue_number = '';
            let pr_number    = '';
            let source       = event;

            // ── Issue labeled ─────────────────────────────────────────────
            if (event === 'issues' && context.payload.action === 'labeled') {
              const issue  = context.payload.issue;
              const labels = issue.labels.map(l => l.name.toLowerCase());

              if (!labels.some(l => l.startsWith('claude:'))) {
                core.setOutput('should_run', 'false'); return;
              }

              if      (labels.includes('claude:expert'))   agent = 'expert';
              else if (labels.includes('claude:senior'))   agent = 'senior';
              else if (labels.includes('claude:junior'))   agent = 'junior';
              else if (labels.includes('claude:review'))   agent = 'senior';
              else                                          agent = 'auto';

              if (labels.includes('claude:pipeline'))      pipeline = 'junior,senior,expert';
              if (labels.includes('claude:priority'))      priority = '2';

              task_title   = issue.title;
              task_body    = [
                issue.body || '(no description)',
                '',
                '---',
                `Source: GitHub Issue #${issue.number}`,
                `Repo: ${repoOwner}/${repoName}`,
                `URL: ${issue.html_url}`,
                `Labels: ${labels.join(', ')}`,
                `Author: ${issue.user.login}`,
              ].join('\n');

              issue_number = String(issue.number);
              should_run   = true;
              source       = 'github_issue';
            }

            // ── Pull request ──────────────────────────────────────────────
            else if (event === 'pull_request') {
              const pr = context.payload.pull_request;
              if (pr.draft) { core.setOutput('should_run', 'false'); return; }

              task_title = `Code review: ${pr.title}`;
              task_body  = [
                'Review this pull request for bugs, security issues, and best practices.',
                'Focus on: correctness, edge cases, error handling, and code style.',
                '',
                `PR: ${pr.title}`,
                `Branch: ${pr.head.ref} → ${pr.base.ref}`,
                `Author: ${pr.user.login}`,
                `Files changed: ${pr.changed_files}`,
                `+${pr.additions} / -${pr.deletions}`,
                '',
                'Description:',
                pr.body || '(none)',
                '',
                `URL: ${pr.html_url}`,
                `Repo: ${repoOwner}/${repoName}`,
              ].join('\n');

              agent      = 'senior';
              pr_number  = String(pr.number);
              should_run = true;
              source     = 'github_pr';
            }

            // ── Manual dispatch ───────────────────────────────────────────
            else if (event === 'workflow_dispatch') {
              const inp  = context.payload.inputs;
              task_title = inp.title;
              task_body  = inp.body + `\n\nRepo: ${repoOwner}/${repoName}`;
              agent      = inp.agent || 'auto';
              pipeline   = inp.pipeline || '';
              should_run = true;
              source     = 'manual';
            }

            // ── Scheduled nightly ─────────────────────────────────────────
            else if (event === 'schedule') {
              task_title = `Nightly maintenance: ${repoName}`;
              task_body  = [
                'Run the following maintenance tasks for this project:',
                '1. Dependency audit (check for vulnerabilities)',
                '2. Verify tests pass',
                '3. Check for obvious code quality issues',
                '4. Summarise findings — flag anything urgent',
                '',
                `Repo: ${repoOwner}/${repoName}`,
                `Run: ${new Date().toISOString()}`,
              ].join('\n');
              agent      = 'senior';
              priority   = '8';
              should_run = true;
              source     = 'schedule';
            }

            core.setOutput('should_run',   String(should_run));
            core.setOutput('task_title',   task_title);
            core.setOutput('task_body',    task_body);
            core.setOutput('agent',        agent);
            core.setOutput('pipeline',     pipeline);
            core.setOutput('priority',     priority);
            core.setOutput('issue_number', issue_number);
            core.setOutput('pr_number',    pr_number);
            core.setOutput('source',       source);
            core.setOutput('repo_name',    repoName);

  # ── Job 2: Acknowledge immediately ─────────────────────────────────────────
  acknowledge:
    name: Acknowledge
    needs: resolve
    if: |
      needs.resolve.outputs.should_run == 'true' &&
      (needs.resolve.outputs.issue_number != '' || needs.resolve.outputs.pr_number != '')
    runs-on: ubuntu-latest
    steps:
      - name: Post acknowledgement comment
        uses: actions/github-script@v7
        with:
          script: |
            const agent    = '${{ needs.resolve.outputs.agent }}';
            const pipeline = '${{ needs.resolve.outputs.pipeline }}';
            const source   = '${{ needs.resolve.outputs.source }}';
            const number   = '${{ needs.resolve.outputs.issue_number }}' ||
                             '${{ needs.resolve.outputs.pr_number }}';

            const agentLine = pipeline
              ? `**Pipeline:** ${pipeline.split(',').join(' → ')}`
              : `**Agent:** ${agent === 'auto' ? 'auto-routing' : agent}`;

            await github.rest.issues.createComment({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: parseInt(number),
              body: [
                '🤖 **Agent Fleet — Task Received**',
                '',
                agentLine,
                `**Source:** ${source}`,
                `**Workflow:** [View run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
                '',
                '_Dispatching to VPS now. Results will be posted here when complete._',
              ].join('\n'),
            });

  # ── Job 3: SSH into VPS, read .fleet.yml, dispatch task ────────────────────
  dispatch:
    name: Dispatch to VPS
    needs: [resolve, acknowledge]
    if: |
      always() &&
      needs.resolve.outputs.should_run == 'true' &&
      (needs.acknowledge.result == 'success' || needs.acknowledge.result == 'skipped')
    runs-on: ubuntu-latest
    outputs:
      task_id: ${{ steps.dispatch.outputs.task_id }}

    steps:
      - name: Checkout project (to read .fleet.yml)
        uses: actions/checkout@v4

      - name: Read .fleet.yml config
        id: config
        run: |
          if [ -f ".fleet.yml" ]; then
            # Parse workdir
            WORKDIR=$(grep -E '^workdir:' .fleet.yml | awk '{print $2}' | tr -d '"' || echo "")
            # Parse branch_strategy
            BRANCH_STRATEGY=$(grep -E '^branch_strategy:' .fleet.yml | awk '{print $2}' | tr -d '"' || echo "new-branch")
            # Parse test_command
            TEST_CMD=$(grep -E '^test_command:' .fleet.yml | cut -d':' -f2- | xargs || echo "npm test")
          else
            WORKDIR=""
            BRANCH_STRATEGY="new-branch"
            TEST_CMD="npm test"
          fi

          # Fallback workdir: use repo name under ~/projects/
          if [ -z "$WORKDIR" ]; then
            WORKDIR="~/projects/${{ needs.resolve.outputs.repo_name }}"
          fi

          echo "workdir=${WORKDIR}"           >> $GITHUB_OUTPUT
          echo "branch_strategy=${BRANCH_STRATEGY}" >> $GITHUB_OUTPUT
          echo "test_cmd=${TEST_CMD}"         >> $GITHUB_OUTPUT

      - name: Install SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/fleet_key
          chmod 600 ~/.ssh/fleet_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Write task body to file
        run: |
          cat > /tmp/task_body_${{ github.run_id }}.txt << 'BODYEOF'
          ${{ needs.resolve.outputs.task_body }}
          BODYEOF

      - name: Copy task body to VPS
        run: |
          scp -i ~/.ssh/fleet_key \
            -o StrictHostKeyChecking=no \
            /tmp/task_body_${{ github.run_id }}.txt \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/fleet_task_${{ github.run_id }}.txt"

      - name: Dispatch via SSH
        id: dispatch
        env:
          AGENT:           ${{ needs.resolve.outputs.agent }}
          PIPELINE:        ${{ needs.resolve.outputs.pipeline }}
          PRIORITY:        ${{ needs.resolve.outputs.priority }}
          SOURCE:          ${{ needs.resolve.outputs.source }}
          WORKDIR:         ${{ steps.config.outputs.workdir }}
          BRANCH_STRATEGY: ${{ steps.config.outputs.branch_strategy }}
          TEST_CMD:        ${{ steps.config.outputs.test_cmd }}
          REPO_NAME:       ${{ needs.resolve.outputs.repo_name }}
          RUN_ID:          ${{ github.run_id }}
        run: |
          TASK_ID=$(ssh -i ~/.ssh/fleet_key \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=30 \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            FLEET_DIR="${{ secrets.FLEET_DIR }}" \
            WORKDIR="$WORKDIR" \
            AGENT="$AGENT" \
            PIPELINE="$PIPELINE" \
            PRIORITY="$PRIORITY" \
            SOURCE="$SOURCE" \
            BRANCH_STRATEGY="$BRANCH_STRATEGY" \
            TEST_CMD="$TEST_CMD" \
            REPO_NAME="$REPO_NAME" \
            RUN_ID="$RUN_ID" \
            'bash -s' << 'SSHEOF'
              set -e
              FLEET="${FLEET_DIR:-$HOME/agent-fleet}"
              cd "$FLEET"

              # Auto-clone project if not present on VPS
              PROJ_DIR=$(eval echo "$WORKDIR")
              if [ ! -d "$PROJ_DIR" ]; then
                mkdir -p "$(dirname "$PROJ_DIR")"
                git clone "https://github.com/${{ github.repository }}.git" "$PROJ_DIR"
                echo "Cloned ${{ github.repository }} to $PROJ_DIR"
              else
                # Pull latest
                git -C "$PROJ_DIR" pull --ff-only 2>/dev/null || true
              fi

              # Read task body
              BODY=$(cat "/tmp/fleet_task_${RUN_ID}.txt")
              rm -f "/tmp/fleet_task_${RUN_ID}.txt"

              # Build extra context for the agent
              CONTEXT="Working directory: $PROJ_DIR
Branch strategy: $BRANCH_STRATEGY
Test command: $TEST_CMD
Repository: ${{ github.repository }}"

              FULL_BODY="$BODY

---
$CONTEXT"

              TITLE="${{ needs.resolve.outputs.task_title }}"

              if [ -n "$PIPELINE" ]; then
                TASK_ID=$(node cli.js pipeline-raw "$TITLE" "$FULL_BODY" "$PIPELINE" "$RUN_ID" "$SOURCE" "$PROJ_DIR")
              else
                TASK_ID=$(node cli.js add-raw "$TITLE" "$FULL_BODY" "$PRIORITY" "$AGENT" "$SOURCE" "$RUN_ID" "$PROJ_DIR")
              fi

              echo "$TASK_ID"
          SSHEOF
          )

          echo "task_id=${TASK_ID}" >> $GITHUB_OUTPUT
          echo "Dispatched task: ${TASK_ID}"

      - name: Comment task ID
        if: |
          steps.dispatch.outputs.task_id != '' &&
          (needs.resolve.outputs.issue_number != '' || needs.resolve.outputs.pr_number != '')
        uses: actions/github-script@v7
        with:
          script: |
            const number = '${{ needs.resolve.outputs.issue_number }}' ||
                           '${{ needs.resolve.outputs.pr_number }}';
            await github.rest.issues.createComment({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: parseInt(number),
              body: `📋 **Task queued**  \`${{ steps.dispatch.outputs.task_id }}\`\n\n_Agent is working. Results posted here when done._`,
            });

  # ── Job 4: Poll for result and post back ────────────────────────────────────
  report:
    name: Report result
    needs: [resolve, dispatch]
    if: |
      always() &&
      needs.dispatch.outputs.task_id != '' &&
      (needs.resolve.outputs.issue_number != '' || needs.resolve.outputs.pr_number != '')
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Install SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/fleet_key
          chmod 600 ~/.ssh/fleet_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Poll VPS for completion
        id: poll
        run: |
          TASK_ID="${{ needs.dispatch.outputs.task_id }}"
          MAX=60
          ATTEMPT=0

          while [ $ATTEMPT -lt $MAX ]; do
            RESULT=$(ssh -i ~/.ssh/fleet_key \
              -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
              "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
              "cd ${FLEET_DIR:-\$HOME/agent-fleet} && node cli.js task-json $TASK_ID" 2>/dev/null || echo '{}')

            STATUS=$(echo "$RESULT" | python3 -c \
              "import sys,json; print(json.load(sys.stdin).get('status',''))" 2>/dev/null || echo "")

            echo "[$ATTEMPT] status: $STATUS"

            if [[ "$STATUS" == "complete" || "$STATUS" == "failed" || "$STATUS" == "cancelled" ]]; then
              # Escape for GitHub output
              RESULT_SAFE="${RESULT//'%'/'%25'}"
              RESULT_SAFE="${RESULT_SAFE//$'\n'/'%0A'}"
              RESULT_SAFE="${RESULT_SAFE//$'\r'/'%0D'}"
              echo "result=${RESULT_SAFE}" >> $GITHUB_OUTPUT
              echo "status=${STATUS}"      >> $GITHUB_OUTPUT
              break
            fi

            ATTEMPT=$((ATTEMPT+1))
            sleep 30
          done

          if [ $ATTEMPT -ge $MAX ]; then
            echo "status=timeout" >> $GITHUB_OUTPUT
          fi
        env:
          FLEET_DIR: ${{ secrets.FLEET_DIR }}

      - name: Post result comment
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ steps.poll.outputs.status }}';
            const number = '${{ needs.resolve.outputs.issue_number }}' ||
                           '${{ needs.resolve.outputs.pr_number }}';
            const taskId = '${{ needs.dispatch.outputs.task_id }}';

            let result = {};
            try {
              const raw = decodeURIComponent('${{ steps.poll.outputs.result }}'.replace(/%0A/g,'\n').replace(/%0D/g,'\r').replace(/%25/g,'%'));
              result = JSON.parse(raw || '{}');
            } catch {}

            const output  = (result.output || '').slice(0, 3500);
            const error   = (result.error  || '').slice(0, 800);
            const agentId = result.agent_id || 'unknown';

            const emoji = { complete:'✅', failed:'❌', cancelled:'🚫', timeout:'⏱️' }[status] || '❓';

            const parts = [
              `${emoji} **Agent Fleet — ${status.charAt(0).toUpperCase()+status.slice(1)}**`,
              '',
              `**Task:** \`${taskId}\`  **Agent:** ${agentId}`,
              '',
            ];

            if (output) {
              parts.push('<details><summary>View output</summary>', '', '```', output);
              if ((result.output||'').length > 3500) parts.push('... (truncated)');
              parts.push('```', '', '</details>');
            }

            if (error) {
              parts.push('', '**Error:**', '```', error, '```');
            }

            if (status === 'timeout') {
              parts.push('', '_Task still running on VPS. Check dashboard for live status._');
            }

            await github.rest.issues.createComment({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: parseInt(number),
              body:         parts.join('\n'),
            });

            // Auto-close issue on success
            if (status === 'complete' && '${{ needs.resolve.outputs.issue_number }}') {
              await github.rest.issues.update({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: parseInt(number),
                state:        'closed',
                state_reason: 'completed',
              });
            }
